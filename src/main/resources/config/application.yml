# APPLICATION --------------------------------------------------------------------------------------



application:
  client:
    class-in:
      url-template: "classin://https://www.eeo.cn/enterclass?telephone=0084-{telephone}&classId={classId}&courseId={courseId}&schoolId={schoolId}"

  ## crm_integration -------------------------------------------------------------------------------
  class_crm_integration:
    queue_order_create: "queue_order_create"
    queue_order_create_delay: "queue_order_create_delay"
    queue_order_update: "queue_order_update"
    queue_order_update_delay: "queue_order_update_delay"

  ## calendar --------------------------------------------------------------------------------------
  calendar:
    arrange-class:
      regular:
        arrange-types-ignored: 'CHANGE_CLASS_IN_FUTURE'
        arrange-types-ignored-old-class: ''
        hour-will-create-class: 18
        max-number-day-of-regular: 14
        max-number-day-of-regular-plus: 20
        max-number-day-of-student-babi: 6
        max-class-regular-assigned: 21
        min-number-day-new-class: 7
        min-number-day-old-class: 3
        number-ranks-of-teacher: 3
        order-extended-number-day-1: 2
        order-extended-number-day-2: 0
        #        product-type-codes-ignored: 'REG_BASIC11,REG_BASIC14'
        product-type-codes-ignored: 'TUTOR_PLUS11_DUAL,EDUPIA_TUTOR_PR_1_6,EDUPIA_CENTER_REG_1_20'
        test:
          enable: false
          students: '' # Danh sách id của học sinh cần test
        enable-required-arrange: false
        increase-level-day: '20250602'

    holidays: '{20250901,20250902}'
    homeroom-teacher-default: '855604'
    ## prefix class and session type
    class_demo_prefix_code: "D"
    session_regular_prefix_code: "R"
    session_make_up_prefix_code: "RMK"
    after_holidays: "20240507,20240508"

    # Lớp Babi (GRADE 0-1-2)
    grade_babi_class_codes: '{"GRADE_0","GRADE_1","GRADE_2"}'

    increment:
      redis_demo_class: REDIS_INCREMENT_DEMO_CLASS
      redis_demo_slot: REDIS_INCREMENT_DEMO_SLOT
      redis_regular_class: REDIS_INCREMENT_REGULAR_CLASS

    kafka:
      topic:
        student_weekly_exercise_result: "tutor.lms.student_weekly_exercise_result"
        student_exercise_tracking: "tutor.lms.student_exercise_tracking"
        remove_student_out_of_credit: "tutor.lms.remove_student_out_of_credit"
        the_new_school_year:
          increase_grade_babi_to_th: "tutor.lms.increase_grade_babi_to_th"
          increase_grade_th_to_thcs: "tutor.lms.increase_grade_th_to_thcs"
          increase_normal_grade_for_student: "tutor.lms.increase_normal_grade_for_student"
          increase_normal_grade_for_class: "tutor.lms.increase_normal_grade_for_class"
          increase_grade_thcs_to_thpt: "tutor.lms.increase_grade_thcs_to_thpt"
        waiting_for_start_class_have_first_session_is_canceled: "tutor.lms.waiting_for_start_class_have_first_session_is_canceled"
        activate-self-learning-account: "tutor.lms.activate-self-learning-account"
        auto-arrange-class-regular-for-student: "tutor.lms.auto-arrange-class-regular-for-student"
        auto-update-status-class-regular-session: "tutor.lms.auto-update-status-class-regular-session"
        cancel-task-when-student-out-of-credit: "tutor.lms.cancel-task-when-student-out-of-credit"
