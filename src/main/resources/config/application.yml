      number-hand-ups-per-session-th-grade: 10
      number-hand-ups-per-session-other-grade: 5
      percentage-qualified-of-month: 80
      number-total-score-qualified-of-month: 70
      start-date-for-common-comment: "20"
      end-date-for-common-comment: "20"
      percentage-qualified-of-session: 90
      percentage-qualified-of-homework: 50
