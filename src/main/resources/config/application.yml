# EUREKA -------------------------------------------------------------------------------------------
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8061/eureka/
  instance:
    lease-renewal-interval-in-seconds: 5
    prefer-ip-address: true
    preferIpAddress: true

# JAVERS -------------------------------------------------------------------------------------------
javers:
  algorithm: AS_SET

# MANAGEMENT ---------------------------------------------------------------------------------------
management:
  endpoint:
    health:
      show-details: always
    info.enabled: true
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: "*"
  health:
    elasticsearch:
      enabled: false
    mail:
      enabled: false
    mongo:
      enabled: false
    rabbit:
      enabled: false
    redis:
      enabled: false

# SPRING -------------------------------------------------------------------------------------------
spring:
  #  # MONGODB ----------------------------------------------------------------------------------------
  #  data:
  #    mongodb:
  #      auto-index-creation: true

  #  ## HIKARI
  #  datasource:
  #    hikari:
  #      minimum-idle: 2
  #      maximum-pool-size: 5

  # JPA --------------------------------------------------------------------------------------------
  jpa:
    generate-ddl: true
    hibernate.naming:
      physical-strategy: org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
      implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    properties.hibernate:
      hbm2ddl.auto: none
      cache.use_second_level_cache: false
      cache.use_query_cache: false
      show_sql: false
      use_sql_comments: false
      format_sql: true
      generate_statistics: false
      storage_engine: innodb
      jdbc.batch_size: 10000

  ## MAIL
  mail:
    secondary:
      properties:
        mail:
          transport:
            protocol: "smtp"
          smtp:
            port: 587
            auth: true
            starttls:
              enable: true
              required: true
    primary:
      properties:
        mail:
          transport:
            protocol: "smtp"
          smtp:
            port: 25
            auth: true
            starttls:
              enable: true
              required: true
    properties:
      mail:
        transport:
          protocol: "smtp"
        smtp:
          port: 587
          auth: true
          starttls:
            enable: true
            required: true

  main:
    allow-bean-definition-overriding: true

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

---
spring:
  config.activate.on-profile: k8s

# EUREKA -------------------------------------------------------------------------------------------
eureka:
  client:
    serviceUrl:
      defaultZone: http://service-discovery:8061/eureka/